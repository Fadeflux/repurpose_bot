<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Repurpose Bot — Fadeflux Agency</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --panel-2: #1a1e24;
    --border: #262b33;
    --border-strong: #3a414c;
    --text: #e6e8eb;
    --text-muted: #8a929e;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --accent-soft: rgba(59, 130, 246, 0.15);
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --drive: #4285f4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 1300px; margin: 0 auto; }
  h1 {
    text-align: center;
    margin: 0 0 6px 0;
    font-size: 28px;
    font-weight: 600;
  }
  .subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 24px;
    font-size: 13px;
  }
  .subtitle .warn { color: var(--warning); font-weight: 600; }
  .drive-status {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .drive-status.on { background: rgba(34, 197, 94, 0.15); color: var(--success); }
  .drive-status.off { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

  /* Upload box */
  .upload-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .upload-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .upload-row:last-child { margin-bottom: 0; }
  .upload-row label {
    min-width: 170px;
    font-weight: 500;
    font-size: 13px;
  }
  .upload-row input[type="text"],
  .file-display {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 9px 13px;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
  }
  .file-display {
    min-height: 40px;
    display: flex;
    align-items: center;
    color: var(--text-muted);
  }
  .file-display.selected { color: var(--text); }
  .btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 9px 20px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--panel-2); border-color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 500;
    width: 100%;
    padding: 14px;
    font-size: 15px;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled {
    background: var(--panel-2);
    border-color: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  .inline-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .inline-toggle input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
  }

  /* Params grid */
  .params-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .param-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    transition: border-color 0.15s, opacity 0.15s;
  }
  .param-card.disabled { opacity: 0.5; }
  .param-card.disabled input[type="number"] { pointer-events: none; }
  .param-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    font-weight: 500;
    font-size: 14px;
  }
  .param-header input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
  }
  .param-inputs { display: flex; gap: 6px; align-items: center; }
  .param-inputs label { font-size: 11px; color: var(--text-muted); }
  .param-inputs input {
    width: 60px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 5px 7px;
    border-radius: 5px;
    font-size: 12px;
    font-family: inherit;
  }
  .param-inputs input:focus { outline: none; border-color: var(--accent); }

  /* Footer */
  .footer-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .copies-box, .drive-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .copies-box { flex: 1; }
  .copies-box label { font-weight: 500; font-size: 13px; }
  .copies-box input[type="number"] {
    width: 80px;
    background: var(--panel-2);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  .total-preview {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .total-preview strong { color: var(--accent); font-size: 14px; }

  /* Results */
  .results {
    margin-top: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    display: none;
  }
  .results.active { display: block; }
  .results h3 { margin: 0 0 12px 0; font-size: 16px; }
  .drive-link-banner {
    background: rgba(66, 133, 244, 0.12);
    border: 1px solid var(--drive);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .drive-link-banner a {
    background: var(--drive);
    color: white;
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 500;
    font-size: 13px;
  }
  .drive-link-banner a:hover { filter: brightness(1.1); }
  .result-item {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }
  .result-item.fail { border-color: var(--danger); }
  .result-item .name { font-family: monospace; color: var(--text-muted); font-size: 11px; }
  .result-item .dl {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .result-item .dl:hover { text-decoration: underline; }

  /* Status / progress */
  .status-bar {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 13px;
    display: none;
  }
  .status-bar.active { display: flex; align-items: center; gap: 10px; }
  .status-bar.loading { background: var(--accent-soft); color: var(--accent); }
  .status-bar.success { background: rgba(34, 197, 94, 0.15); color: var(--success); }
  .status-bar.error { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>
    Repurpose Bot
    <span class="drive-status" id="driveStatus">Drive : …</span>
    <span class="drive-status on" style="background: rgba(245, 158, 11, 0.15); color: var(--warning);">60 fps · 1080×1920</span>
  </h1>
  <p class="subtitle">
    <span class="warn">IMPORTANT :</span>
    Décoche une case pour désactiver un filtre. Valeurs randomisées entre Min et Max.
  </p>

  <!-- Upload + batch name -->
  <div class="upload-box">
    <div class="upload-row">
      <label>Select Video Files :</label>
      <div class="file-display" id="fileDisplay">Aucun fichier sélectionné</div>
      <input type="file" id="fileInput" accept="video/*" multiple style="display:none" />
      <button class="btn" onclick="document.getElementById('fileInput').click()">Browse</button>
    </div>
    <div class="upload-row">
      <label>VA :</label>
      <select id="vaName" style="background: var(--panel-2); border: 1px solid var(--border-strong); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; max-width: 220px;">
        <option value="">-- Sélectionner VA --</option>
      </select>
      <button class="btn" onclick="resyncVAs()" title="Resync depuis Discord" style="padding: 6px 10px; font-size: 11px;">🔄</button>
      <label>Modele :</label>
      <select id="batchName" style="background: var(--panel-2); border: 1px solid var(--border-strong); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer;">
        <option value="">-- Choisir un modele --</option>
        <option value="Modele 1">Modele 1</option>
        <option value="Modele 2">Modele 2</option>
        <option value="Modele 3">Modele 3</option>
        <option value="Modele 4">Modele 4</option>
        <option value="Modele 5">Modele 5</option>
        <option value="Modele 6">Modele 6</option>
        <option value="Modele 7">Modele 7</option>
        <option value="Modele 8">Modele 8</option>
        <option value="Modele 9">Modele 9</option>
        <option value="Modele 10">Modele 10</option>
        <option value="Modele 11">Modele 11</option>
        <option value="Modele 12">Modele 12</option>
      </select>
      <div class="inline-toggle">
        <input type="checkbox" id="uploadDrive" checked />
        <label for="uploadDrive">Upload Drive</label>
      </div>
    </div>
  </div>

  <!-- Params grid -->
  <div class="params-grid" id="paramsGrid"></div>

  <!-- Footer: copies -->
  <div class="footer-row">
    <div class="copies-box">
      <label>Copies per video :</label>
      <input type="number" id="copies" value="1" min="1" max="100" onchange="updatePreview()" />
      <span class="total-preview" id="totalPreview">0 vidéos × 1 copie = <strong>0 total</strong></span>
    </div>
    <div class="copies-box" style="flex: 0 0 auto;">
      <label>Speed :</label>
      <select id="concurrency" style="background: var(--panel-2); border: 1px solid var(--border-strong); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer;">
        <option value="1">🐢 Lent</option>
        <option value="2">🚶 Normal</option>
        <option value="3">🏃 Rapide</option>
        <option value="4" selected>⚡ Ultra</option>
        <option value="6">🚀 Max</option>
      </select>
    </div>
  </div>

  <div class="footer-row" style="margin-top: 10px;">
    <div class="copies-box" style="flex: 1;">
      <label>Device simulé :</label>
      <select id="deviceChoice" style="background: var(--panel-2); border: 1px solid var(--border-strong); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; min-width: 280px;">
        <optgroup label="🎲 Aléatoire">
          <option value="mix_random" selected>Mix iPhone + Android (50/50)</option>
          <option value="iphone_random">📱 iPhone aléatoire (16 ou 17)</option>
          <option value="android_random">🅰️ Android aléatoire</option>
          <option value="samsung_random">Samsung aléatoire</option>
          <option value="pixel_random">Google Pixel aléatoire</option>
        </optgroup>
        <optgroup label="📱 iPhone 17 (iOS 26)">
          <option value="iphone_17_pro_max">iPhone 17 Pro Max</option>
          <option value="iphone_17_pro">iPhone 17 Pro</option>
          <option value="iphone_17_air">iPhone 17 Air</option>
          <option value="iphone_17">iPhone 17</option>
        </optgroup>
        <optgroup label="📱 iPhone 16 (iOS 18/26)">
          <option value="iphone_16_pro_max">iPhone 16 Pro Max</option>
          <option value="iphone_16_pro">iPhone 16 Pro</option>
          <option value="iphone_16_plus">iPhone 16 Plus</option>
          <option value="iphone_16">iPhone 16</option>
          <option value="iphone_16e">iPhone 16e</option>
        </optgroup>
        <optgroup label="🅰️ Samsung Galaxy S25">
          <option value="samsung_s25_ultra">Galaxy S25 Ultra</option>
          <option value="samsung_s25_plus">Galaxy S25+</option>
          <option value="samsung_s25">Galaxy S25</option>
        </optgroup>
        <optgroup label="🅰️ Samsung Galaxy S24">
          <option value="samsung_s24_ultra">Galaxy S24 Ultra</option>
          <option value="samsung_s24_plus">Galaxy S24+</option>
          <option value="samsung_s24">Galaxy S24</option>
        </optgroup>
        <optgroup label="🅰️ Samsung Galaxy S23">
          <option value="samsung_s23_ultra">Galaxy S23 Ultra</option>
          <option value="samsung_s23_plus">Galaxy S23+</option>
          <option value="samsung_s23">Galaxy S23</option>
        </optgroup>
        <optgroup label="🅰️ Google Pixel">
          <option value="pixel_9_pro_xl">Pixel 9 Pro XL</option>
          <option value="pixel_9_pro">Pixel 9 Pro</option>
          <option value="pixel_9">Pixel 9</option>
          <option value="pixel_8_pro">Pixel 8 Pro</option>
          <option value="pixel_8">Pixel 8</option>
        </optgroup>
        <optgroup label="🅰️ Xiaomi">
          <option value="xiaomi_15_ultra">Xiaomi 15 Ultra</option>
          <option value="xiaomi_15_pro">Xiaomi 15 Pro</option>
          <option value="xiaomi_15">Xiaomi 15</option>
        </optgroup>
      </select>
    </div>
  </div>

  <button class="btn btn-primary" id="generateBtn" onclick="generate()">Generate</button>

  <div class="status-bar" id="statusBar"></div>

  <!-- Drive upload progress bar -->
  <div id="driveProgressWrap" style="display:none; margin-top:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <span style="font-size:13px; color:var(--muted);">
        📁 Upload Google Drive
      </span>
      <span style="font-size:13px; color:var(--muted);" id="driveProgressText">0 / 0</span>
    </div>
    <div style="background:var(--panel-2); border-radius:8px; height:20px; overflow:hidden; border:1px solid var(--border);">
      <div id="driveProgressBar" style="background:linear-gradient(90deg, #4285f4, #34a853); height:100%; width:0%; transition:width 0.3s ease; display:flex; align-items:center; justify-content:center; color:white; font-size:12px; font-weight:600;"></div>
    </div>
  </div>

  <div class="results" id="resultsBox">
    <h3>Résultats</h3>
    <div id="driveBanner"></div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
// =========================================================================
// Config des paramètres (aligné avec le backend)
// =========================================================================
const PARAMS = [
  { key: "bitrate",    label: "Video Bitrate",min: 1000,  max: 20000, step: 100,    defMin: 8000,  defMax: 12000 },
  { key: "brightness", label: "Brightness",   min: -1,    max: 1,     step: 0.01,   defMin: -0.05, defMax: 0.05  },
  { key: "contrast",   label: "Contrast",     min: 0,     max: 2,     step: 0.01,   defMin: 0.95,  defMax: 1.10  },
  { key: "saturation", label: "Saturation",   min: 0,     max: 3,     step: 0.01,   defMin: 0.95,  defMax: 1.15  },
  { key: "gamma",      label: "Gamma",        min: 0.1,   max: 10,    step: 0.01,   defMin: 0.95,  defMax: 1.05  },
  { key: "speed",      label: "Speed",        min: 0.5,   max: 2,     step: 0.001,  defMin: 1.03,  defMax: 1.04  },
  { key: "zoom",       label: "Zoom",         min: 1.0,   max: 1.3,   step: 0.001,  defMin: 1.03,  defMax: 1.06  },
  { key: "noise",      label: "Noise",        min: 0,     max: 100,   step: 1,      defMin: 5,     defMax: 15    },
  { key: "vignette",   label: "Vignette",     min: 0,     max: 1.5,   step: 0.01,   defMin: 0.20,  defMax: 0.40  },
  { key: "rotation",   label: "Rotation",     min: -5,    max: 5,     step: 0.1,    defMin: -0.5,  defMax: 0.5   },
  { key: "cut_start",  label: "Cut Start",    min: 0,     max: 5,     step: 0.01,   defMin: 0.1,   defMax: 0.15  },
  { key: "cut_end",    label: "Cut End",      min: 0,     max: 5,     step: 0.01,   defMin: 0.1,   defMax: 0.15  },
];

// =========================================================================
// Grille de paramètres
// =========================================================================
function buildParamsGrid() {
  const grid = document.getElementById("paramsGrid");
  grid.innerHTML = "";
  PARAMS.forEach(p => {
    const card = document.createElement("div");
    card.className = "param-card";
    card.dataset.key = p.key;
    card.innerHTML = `
      <div class="param-header">
        <input type="checkbox" id="cb_${p.key}" checked />
        <label for="cb_${p.key}">${p.label}</label>
      </div>
      <div class="param-inputs">
        <label>Min</label>
        <input type="number" id="min_${p.key}" value="${p.defMin}" step="${p.step}" min="${p.min}" max="${p.max}" />
        <label>Max</label>
        <input type="number" id="max_${p.key}" value="${p.defMax}" step="${p.step}" min="${p.min}" max="${p.max}" />
      </div>
    `;
    grid.appendChild(card);
    const cb = card.querySelector(`#cb_${p.key}`);
    cb.addEventListener("change", () => {
      card.classList.toggle("disabled", !cb.checked);
    });
  });
}

// =========================================================================
// Gestion des fichiers
// =========================================================================
const fileInput = document.getElementById("fileInput");
const fileDisplay = document.getElementById("fileDisplay");

fileInput.addEventListener("change", e => {
  const files = Array.from(e.target.files || []);
  if (files.length === 0) {
    fileDisplay.textContent = "Aucun fichier sélectionné";
    fileDisplay.classList.remove("selected");
  } else {
    const totalMB = (files.reduce((a, f) => a + f.size, 0) / 1024 / 1024).toFixed(1);
    if (files.length === 1) {
      fileDisplay.textContent = `${files[0].name} (${totalMB} MB)`;
    } else {
      fileDisplay.textContent = `${files.length} vidéos sélectionnées (${totalMB} MB total)`;
    }
    fileDisplay.classList.add("selected");
  }
  updatePreview();
});

function updatePreview() {
  const nb = fileInput.files?.length || 0;
  const copies = parseInt(document.getElementById("copies").value, 10) || 1;
  const total = nb * copies;
  document.getElementById("totalPreview").innerHTML =
    `${nb} vidéo${nb > 1 ? "s" : ""} × ${copies} ${copies > 1 ? "copies" : "copie"} = <strong>${total} total</strong>`;
}

// =========================================================================
// Status helpers
// =========================================================================
function setStatus(msg, type = "loading") {
  const bar = document.getElementById("statusBar");
  bar.className = `status-bar active ${type}`;
  bar.innerHTML = type === "loading"
    ? `<span class="spinner"></span>${msg}`
    : msg;
}

// =========================================================================
// Drive status au chargement
// =========================================================================
async function checkDriveStatus() {
  try {
    const res = await fetch("/api/health");
    const data = await res.json();
    const badge = document.getElementById("driveStatus");
    if (data.drive_enabled) {
      badge.textContent = "Drive : ON";
      badge.className = "drive-status on";
    } else {
      badge.textContent = "Drive : OFF";
      badge.className = "drive-status off";
      document.getElementById("uploadDrive").checked = false;
      document.getElementById("uploadDrive").disabled = true;
    }
  } catch (e) {
    console.warn("Health check failed", e);
  }
}

// =========================================================================
// Generate
// =========================================================================
async function generate() {
  const files = Array.from(fileInput.files || []);
  if (files.length === 0) {
    setStatus("Sélectionne d'abord une ou plusieurs vidéos.", "error");
    return;
  }

  const copies = parseInt(document.getElementById("copies").value, 10) || 1;
  const batchName = document.getElementById("batchName").value.trim();
  const vaName = document.getElementById("vaName").value.trim();
  const uploadDrive = document.getElementById("uploadDrive").checked;

  const customRanges = {};
  const enabledFilters = [];
  PARAMS.forEach(p => {
    const cb = document.getElementById(`cb_${p.key}`);
    if (cb.checked) {
      enabledFilters.push(p.key);
      const minVal = parseFloat(document.getElementById(`min_${p.key}`).value);
      const maxVal = parseFloat(document.getElementById(`max_${p.key}`).value);
      customRanges[p.key] = [minVal, maxVal];
    }
  });

  const formData = new FormData();
  files.forEach(f => formData.append("files", f));
  formData.append("batch_name", batchName);
  formData.append("va_name", vaName);
  formData.append("copies_per_video", copies);
  formData.append("concurrency", parseInt(document.getElementById("concurrency").value, 10) || 4);
  formData.append("upload_to_drive", uploadDrive ? "true" : "false");
  formData.append("device_choice", document.getElementById("deviceChoice").value || "mix_random");
  formData.append("custom_ranges", JSON.stringify(customRanges));
  formData.append("enabled_filters", JSON.stringify(enabledFilters));

  const btn = document.getElementById("generateBtn");
  btn.disabled = true;
  const totalExpected = files.length * copies;
  setStatus(`Traitement en cours... ${files.length} vidéo${files.length > 1 ? "s" : ""} × ${copies} = ${totalExpected} sorties. Patience (ça peut prendre plusieurs minutes).`);
  document.getElementById("resultsBox").classList.remove("active");

  // Démarre la barre de progression Drive si activé
  let progressInterval = null;
  if (uploadDrive) {
    const wrap = document.getElementById("driveProgressWrap");
    const bar = document.getElementById("driveProgressBar");
    const txt = document.getElementById("driveProgressText");
    wrap.style.display = "block";
    bar.style.width = "0%";
    bar.textContent = "";
    txt.textContent = `0 / ${totalExpected}`;

    progressInterval = setInterval(async () => {
      try {
        const r = await fetch("/api/progress-current");
        const p = await r.json();
        if (p.found && p.total > 0) {
          const percent = p.percent || 0;
          bar.style.width = percent + "%";
          bar.textContent = percent > 10 ? percent.toFixed(1) + "%" : "";
          txt.textContent = `${p.uploaded} / ${p.total}`;
          if (p.done) {
            bar.style.width = "100%";
            bar.textContent = "100%";
            clearInterval(progressInterval);
            progressInterval = null;
          }
        }
      } catch (e) {
        // silent, continue polling
      }
    }, 1500);
  }

  try {
    const res = await fetch("/api/process", { method: "POST", body: formData });
    const data = await res.json();
    if (progressInterval) {
      clearInterval(progressInterval);
      progressInterval = null;
    }

    if (!res.ok) {
      setStatus(`Erreur : ${data.detail || "échec du traitement"}`, "error");
      btn.disabled = false;
      return;
    }

    renderResults(data);
    let msg = `${data.succeeded} / ${data.total_requested} vidéos générées.`;
    if (data.drive?.enabled) {
      msg += ` ${data.drive.uploaded} uploadées sur Drive.`;
    }
    if (data.failed > 0) msg += ` ${data.failed} échec(s).`;
    setStatus(msg, data.failed > 0 ? "error" : "success");
  } catch (e) {
    setStatus(`Erreur réseau : ${e.message}`, "error");
  } finally {
    btn.disabled = false;
  }
}

// =========================================================================
// Affichage des résultats
// =========================================================================
function renderResults(data) {
  const box = document.getElementById("resultsBox");
  const banner = document.getElementById("driveBanner");
  const list = document.getElementById("resultsList");
  banner.innerHTML = "";
  list.innerHTML = "";

  // Bandeau Drive
  if (data.drive?.enabled && data.drive?.folder_url) {
    banner.innerHTML = `
      <div class="drive-link-banner">
        <div>
          <div style="font-weight: 500; margin-bottom: 4px;">📂 Dossier Drive créé</div>
          <div class="name" style="font-family: monospace; font-size: 11px; color: var(--text-muted);">${data.batch_name}</div>
        </div>
        <a href="${data.drive.folder_url}" target="_blank" rel="noopener">Ouvrir sur Drive ↗</a>
      </div>
    `;
  }

  // Liste des vidéos (on limite l'affichage à 50 pour pas exploser le DOM)
  const toShow = data.results.slice(0, 50);
  toShow.forEach(r => {
    const div = document.createElement("div");
    div.className = "result-item" + (r.success ? "" : " fail");
    if (r.success) {
      const sizeMB = (r.size_bytes / 1024 / 1024).toFixed(2);
      const driveLink = r.drive_url
        ? ` · <a class="dl" href="${r.drive_url}" target="_blank">Drive ↗</a>`
        : "";
      div.innerHTML = `
        <div>
          <div>${r.source_file} — Copy #${r.copy_index} · ${sizeMB} MB</div>
          <div class="name">${r.filename}</div>
        </div>
        <div>
          <a class="dl" href="/api/download/${r.filename}" download>Télécharger ↓</a>${driveLink}
        </div>
      `;
    } else {
      div.innerHTML = `
        <div>
          <div>${r.source_file} — Copy #${r.copy_index} <span style="color:var(--danger)">(échec)</span></div>
          <div class="name">${(r.error || "").slice(0, 120)}</div>
        </div>
      `;
    }
    list.appendChild(div);
  });
  if (data.results.length > 50) {
    const more = document.createElement("div");
    more.style.cssText = "text-align:center; padding:10px; color:var(--text-muted); font-size:12px;";
    more.textContent = `... et ${data.results.length - 50} autres (voir le CSV sur Drive)`;
    list.appendChild(more);
  }
  box.classList.add("active");
}

// Init
buildParamsGrid();
checkDriveStatus();
updatePreview();
loadVAs();

// =========================================================================
// Chargement de la liste VA depuis Discord (via /api/vas)
// =========================================================================
async function loadVAs() {
  const select = document.getElementById("vaName");
  if (!select) return;
  try {
    const r = await fetch("/api/vas");
    const data = await r.json();
    const vas = data.vas || [];
    const savedVa = localStorage.getItem("repurpose_va_name") || "";

    // Vide et repeuple le select
    select.innerHTML = '<option value="">-- Sélectionner VA --</option>';
    vas.forEach(v => {
      // Support ancien format (string) + nouveau (objet {name, discord_id})
      const name = typeof v === "string" ? v : v.name;
      if (!name) return;
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      if (name === savedVa) opt.selected = true;
      select.appendChild(opt);
    });

    // Affiche la date de dernière sync
    if (data.last_sync) {
      const d = new Date(data.last_sync);
      select.title = `Dernière sync Discord : ${d.toLocaleString("fr-FR")}`;
    } else if (!data.sync_enabled) {
      select.title = "Sync Discord non configurée (variables d'env manquantes)";
    }

    // Sauvegarde à chaque changement
    select.addEventListener("change", () => {
      localStorage.setItem("repurpose_va_name", select.value);
    });
  } catch (e) {
    console.warn("Impossible de charger la liste VA:", e);
  }
}

// Bouton resync manuel
async function resyncVAs() {
  const select = document.getElementById("vaName");
  if (!select) return;
  const oldTitle = select.title;
  select.title = "Resync en cours...";
  try {
    const r = await fetch("/api/vas/sync", { method: "POST" });
    const data = await r.json();
    if (r.ok) {
      await loadVAs();
      const added = (data.added || []).length;
      const removed = (data.removed || []).length;
      alert(`Sync OK ! ${data.vas.length} VA trouvés.\n+${added} ajoutés, -${removed} supprimés`);
    } else {
      alert(`Sync échouée : ${data.detail || "erreur inconnue"}`);
    }
  } catch (e) {
    alert(`Sync échouée : ${e}`);
    select.title = oldTitle;
  }
}
