[mypy]
# Config démarrage : permissif pour pas bloquer le projet existant,
# strict sur les nouveaux fichiers + ce qu'on a touché récemment.
#
# Run local : mypy app/
# Pour augmenter progressivement la rigueur, déplacer les modules vers
# la section [mypy-app.services.<module>] avec disallow_untyped_defs=True.

python_version = 3.12
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False
no_implicit_optional = False
strict_equality = True
check_untyped_defs = False  # global : off pour pas spammer
ignore_missing_imports = True  # discord/psycopg2/pillow ont pas tous des stubs

# --- Strict sur les modules récemment ajoutés ou critiques ---
[mypy-app.services.cf_settings]
disallow_untyped_defs = True
warn_return_any = True

[mypy-app.services.cf_weekly_stats]
disallow_untyped_defs = True
warn_return_any = True

[mypy-tests.*]
# Tests peuvent être plus laxistes
disallow_untyped_defs = False
check_untyped_defs = False
